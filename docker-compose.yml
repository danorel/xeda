version: '3.3'

services:
  localstack:
    image: localstack/localstack:latest
    environment:
      - DEBUG=True
      - SERVICES=s3
      - AWS_DEFAULT_REGION=$AWS_S3_REGION_NAME
      - EDGE_PORT=4566
    env_file: .env
    ports:
      - '4566-4597:4566-4597'
    healthcheck:
      test: [ "CMD", "awslocal", "s3api", "wait", "bucket-exists", "--bucket", $AWS_STORAGE_BUCKET_NAME ]
      interval: 10s
      timeout: 15s
      retries: 5
    volumes:
      - "./scripts/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - "${TMPDIR:-/tmp/localstack}:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
